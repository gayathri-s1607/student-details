<!DOCTYPE html>
<html>
<head>
<title>Fees Receipts</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    font-family: Arial;
    color: white;
}

.container {
    text-align: center;
}

.box {
    border: 2px solid white;
    box-shadow: 0 0 10px white;
    padding: 15px;
    margin: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Fees Receipts</h2>

    <div class="box">
        Receipt ID: 12345 <br>
        Amount Paid: ₹10,000 <br>
        Date: 10-04-2026
    </div>

    <div class="box">
        Receipt ID: 12346 <br>
        Amount Paid: ₹15,000 <br>
        Date: 15-05-2026
    </div>
</div>

</body>
</html>

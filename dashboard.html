<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .box {
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            background: transparent;
            border: 2px solid white;
            box-shadow: 0 0 15px white, 0 0 30px white;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px white, 0 0 50px white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box" onclick="goFees()">💰 Fees Details</div>
        <div class="box" onclick="goLeave()">📄 Leave Application</div>
        <div class="box" onclick="goOD()">📘 OD Application</div>
        <div class="box" onclick="checkOD()">📊 Check OD Status</div>
    </div>

    <script>
        // 🔒 ROLE PROTECTION
        let role = localStorage.getItem("role");

        if (role !== "student") {
            alert("Access Denied");
            window.location.href = "user_login.html";
        }

        function goFees() {
            window.location.href = "fees.html"; // 👉 this opens fees dashboard
        }

        function goLeave() {
            window.location.href = "leave.html";
        }

        function goOD() {
            window.location.href = "od.html";
        }

        function checkOD() {
            window.location.href = "od_status.html";
        }
    </script>

</body>
</html>

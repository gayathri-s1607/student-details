<!DOCTYPE html>
<html>
<head>
<title>Leave Status</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    font-family: Arial;
    color: white;
}

.container {
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
    <h2>Leave Status</h2>
    <p id="result"></p>
</div>

<script>
let data = JSON.parse(localStorage.getItem("leave"));

if (!data) {
    document.getElementById("result").innerText = "No leave applied";
}
else if (data.status === "Approved") {
    document.getElementById("result").innerText = "Leave Accepted ✅";
}
else {
    document.getElementById("result").innerText = "Pending...";
}
</script>

</body>
</html>

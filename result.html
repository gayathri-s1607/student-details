<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    font-family: Arial;
    color: white;
}

.container {
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
    <h2>Leave Status</h2>
    <p id="result"></p>
</div>

<script>
let parent = localStorage.getItem("parentStatus");
let staff = localStorage.getItem("staffStatus");

if(parent === "deny" || staff === "deny") {
    result.innerText = "Leave Not Accepted ❌";
}
else if(parent === "accept" && staff === "accept") {
    result.innerText = "Leave Accepted ✅";
}
else {
    result.innerText = "Pending...";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Parent Approval</title>

<style>
body {
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    color: white;
    text-align: center;
    font-family: Arial;
}

.box {
    border: 2px solid white;
    box-shadow: 0 0 10px white;
    padding: 10px;
    margin: 10px;
    background: transparent;
    color: white;
}
</style>
</head>

<body>

<h2>Parent Login</h2>

<input class="box" id="id" placeholder="Parent ID"><br>
<input class="box" id="pass" type="password" placeholder="Password"><br>

<button class="box" onclick="login()">Login</button>

<script>
function login() {
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    if(id === "parent" && pass === "123") {
        let choice = confirm("Approve Leave?");
        localStorage.setItem("parentStatus", choice ? "accept" : "deny");
        window.location.href = "staff.html";
    } else {
        alert("Invalid Login");
    }
}
</script>

</body>
</html>

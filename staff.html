<!DOCTYPE html>
<html>
<head>
<title>Staff Dashboard</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    font-family: Arial;
    color: white;
}

.container {
    text-align: center;
}

.box {
    border: 2px solid white;
    box-shadow: 0 0 10px white;
    padding: 12px;
    margin: 10px;
    background: transparent;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Staff Dashboard</h2>

    <!-- LEAVE SECTION -->
    <div id="leaveBox" class="box"></div>
    <button class="box" onclick="approveLeave()">Approve Leave</button>
    <button class="box" onclick="sendLeaveWhatsApp()">Send to Parent</button>

    <!-- OD SECTION -->
    <div id="odBox" class="box"></div>
    <button class="box" onclick="approveOD()">Approve OD</button>
</div>

<script>

// 🔒 ROLE PROTECTION
let role = localStorage.getItem("role");

if (role !== "staff") {
    alert("Access Denied");
    window.location.href = "login.html";
}

// LOAD DATA
function loadData() {

    let leave = JSON.parse(localStorage.getItem("leave"));
    let od = JSON.parse(localStorage.getItem("od"));

    // LEAVE DISPLAY
    if (leave) {
        document.getElementById("leaveBox").innerHTML =
            "<b>Leave Request</b><br>" +
            "Days: " + leave.days +
            "<br>Reason: " + leave.reason +
            "<br>Status: " + leave.status;
    } else {
        document.getElementById("leaveBox").innerHTML = "No Leave Request";
    }

    // OD DISPLAY
    if (od) {
        document.getElementById("odBox").innerHTML =
            "<b>OD Request</b><br>" +
            "Date: " + od.date +
            "<br>Days: " + od.days +
            "<br>Reason: " + od.reason +
            "<br>Status: " + od.status;
    } else {
        document.getElementById("odBox").innerHTML = "No OD Request";
    }
}

// APPROVE LEAVE
function approveLeave() {
    let data = JSON.parse(localStorage.getItem("leave"));

    if (data) {
        data.status = "Approved";
        localStorage.setItem("leave", JSON.stringify(data));
        alert("Leave Approved");
        loadData();
    } else {
        alert("No leave request found");
    }
}

// ✅ WHATSAPP FOR LEAVE ONLY
function sendLeaveWhatsApp() {
    let phone = "919876543210"; // 👉 CHANGE THIS NUMBER

    let data = JSON.parse(localStorage.getItem("leave"));

    if (!data) {
        alert("No leave data found");
        return;
    }

    let message = `Your child applied leave:
Days: ${data.days}
Reason: ${data.reason}
Status: ${data.status}`;

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

// APPROVE OD
function approveOD() {
    let data = JSON.parse(localStorage.getItem("od"));

    if (data) {
        data.status = "Approved";
        data.message = "Your OD request has been approved by staff";
        localStorage.setItem("od", JSON.stringify(data));
        alert("OD Approved");
        loadData();
    } else {
        alert("No OD request found");
    }
}

// INITIAL LOAD
loadData();

</script>

</body>
</html>

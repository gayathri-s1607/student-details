<!DOCTYPE html>
<html>
<head>
<title>Staff Approval</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    font-family: Arial;
    color: white;
}

.container {
    text-align: center;
}

.box {
    border: 2px solid white;
    box-shadow: 0 0 10px white;
    padding: 10px;
    margin: 10px;
    background: transparent;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Staff Login</h2>

    <!-- LOGIN SECTION -->
    <div id="loginSection">
        <input class="box" id="id" placeholder="Staff ID"><br>
        <input class="box" id="pass" type="password" placeholder="Password"><br>
        <button class="box" onclick="login()">Login</button>
    </div>

    <!-- APPROVAL SECTION -->
    <div id="approvalSection" style="display:none;">
        <h2>Leave Request</h2>
        <div id="details"></div>

        <button class="box" onclick="approveLeave()">Approve</button>
        <button class="box" onclick="sendWhatsApp()">Send to Parent</button>
    </div>
</div>

<script>
// 🔒 ROLE PROTECTION
let role = localStorage.getItem("role");

if (role !== "staff") {
    alert("Access Denied");
    window.location.href = "login.html";
}

// LOGIN FUNCTION
function login() {
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    if(id === "staff" && pass === "123") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("approvalSection").style.display = "block";

        loadLeave();
    } else {
        alert("Invalid Login");
    }
}

// LOAD LEAVE DATA
function loadLeave() {
    let data = JSON.parse(localStorage.getItem("leave"));

    if (data) {
        document.getElementById("details").innerHTML =
            "Days: " + data.days + "<br>Reason: " + data.reason + "<br>Status: " + data.status;
    } else {
        document.getElementById("details").innerHTML = "No leave request found";
    }
}

// APPROVE
function approveLeave() {
    let data = JSON.parse(localStorage.getItem("leave"));
    data.status = "Approved";
    localStorage.setItem("leave", JSON.stringify(data));
    alert("Leave Approved");
    loadLeave(); // refresh display
}

// ✅ FIXED WHATSAPP FUNCTION
function sendWhatsApp() {
    let phone = "918667590484"; // 👉 REPLACE WITH REAL NUMBER (NO +, NO SPACES)

    let data = JSON.parse(localStorage.getItem("leave"));

    if (!data) {
        alert("No leave data found");
        return;
    }

    let message = `Your child applied leave:
Days: ${data.days}
Reason: ${data.reason}
Status: ${data.status}`;

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>

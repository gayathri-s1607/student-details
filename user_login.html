<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
            font-family: Arial, sans-serif;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        label {
            color: white;
            font-size: 18px;
            width: 130px;
        }

        input, select {
            padding: 12px;
            width: 220px;
            border-radius: 8px;
            outline: none;
            background: transparent;
            color: white;
            border: 2px solid white;
            box-shadow: 0 0 10px white;
        }

        .login-btn {
            margin-top: 20px;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: 2px solid white;
            background: transparent;
            color: white;
            box-shadow: 0 0 10px white;
        }

        .login-btn:hover {
            box-shadow: 0 0 20px white;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <!-- ✅ ADDED: ROLE SELECTION -->
        <div class="field">
            <label>Role:</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="staff">Staff</option>
            </select>
        </div>

        <div class="field">
            <label>Name:</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="field">
            <label>Roll No:</label>
            <input type="text" placeholder="Enter roll number">
        </div>

        <div class="field">
            <label>Date of Birth:</label>
            <input type="date">
        </div>

        <!-- ✅ UPDATED BUTTON FUNCTION -->
        <button class="login-btn" onclick="login()">Login</button>

    </div>

    <script>
        // ✅ UPDATED FUNCTION
        function login() {
            let role = document.getElementById("role").value;
            let name = document.getElementById("name").value;

            // store role & name
            localStorage.setItem("role", role);
            localStorage.setItem("name", name);

            if (role === "student") {
                window.location.href = "dashboard.html"; // student page
            } else {
                window.location.href = "staff.html"; // staff page
            }
        }
    </script>

</body>
</html>

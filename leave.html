<!DOCTYPE html>
<html>
<head>
<title>Leave Application</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
    font-family: Arial;
    color: white;
}

.container {
    text-align: center;
}

.box {
    border: 2px solid white;
    box-shadow: 0 0 10px white;
    padding: 10px;
    margin: 10px;
    background: transparent;
    color: white;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Leave Application</h2>

    <input class="box" id="taken" placeholder="Leaves Taken"><br>
    <input class="box" id="days" placeholder="Days Requested"><br>
    <textarea class="box" id="reason" placeholder="Reason"></textarea><br>

    <button class="box" onclick="submitForm()">Submit</button>
</div>

<script>
function submitForm() {
    localStorage.setItem("taken", taken.value);
    localStorage.setItem("days", days.value);
    localStorage.setItem("reason", reason.value);

    alert("Submitted! Waiting for Parent Approval");
    window.location.href = "parent.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Same vibrant background */
            background: linear-gradient(135deg, #0f2027, #2c5364, #00c6ff);
            font-family: Arial, sans-serif;
        }

        /* Center glowing box */
        .home-box {
            padding: 40px;
            border-radius: 15px;
            text-align: center;

            background: transparent;

            /* Glowing white border */
            border: 2px solid white;
            box-shadow: 0 0 15px white, 0 0 30px white;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        /* Login button */
        .login-btn {
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            background: transparent;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px white;
        }

        .login-btn:hover {
            box-shadow: 0 0 25px white, 0 0 50px white;
        }
    </style>
</head>

<body>

    <div class="home-box">
        <h2>Welcome to Student Portal</h2>
        <button class="login-btn" onclick="goToLogin()">Login</button>
    </div>

    <script>
        function goToLogin() {
            window.location.href = "user_login.html";
        }
    </script>

</body>
</html>
